workflows:
  ios-simulator:
    name: iOS Simulator Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_config
      flutter: stable
      xcode: 26.4
      cocoapods: default
      vars:
        BUNDLE_ID: org.downsviewsda.downsviewSda
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
    scripts:
      - name: Create app environment file
        script: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_URL and SUPABASE_ANON_KEY must be set in Codemagic environment variables."
            exit 1
          fi
          cat > .env <<EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          EOF
      - name: Install Flutter dependencies
        script: |
          flutter config --no-enable-swift-package-manager
          flutter clean
          flutter pub get
      - name: Run analyzer
        script: flutter analyze lib test
      - name: Run tests
        script: flutter test
      - name: Install iOS pods
        script: |
          cd ios
          pod install
      - name: Build unsigned simulator app
        script: flutter build ios --debug --simulator --no-codesign --build-name=1.0 --build-number=1
    artifacts:
      - build/ios/iphonesimulator/Runner.app
      - flutter_drive.log

  ios-release:
    name: iOS Signed IPA
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: Codemagic App Manager Key
    environment:
      groups:
        - app_config
      flutter: stable
      xcode: 26.4
      cocoapods: default
      vars:
        BUNDLE_ID: org.downsviewsda.downsviewSda
      ios_signing:
        distribution_type: app_store
        bundle_identifier: org.downsviewsda.downsviewSda
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
    scripts:
      - name: Create app environment file
        script: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_URL and SUPABASE_ANON_KEY must be set in Codemagic environment variables."
            exit 1
          fi
          cat > .env <<EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          EOF
      - name: Install Flutter dependencies
        script: |
          flutter config --no-enable-swift-package-manager
          flutter clean
          flutter pub get
      - name: Run analyzer
        script: flutter analyze lib test
      - name: Run tests
        script: flutter test
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Install iOS pods
        script: |
          cd ios
          pod install
      - name: Build signed IPA
        script: |
          set -e
          flutter build ipa --release --build-name=1.0 --build-number=1 --export-options-plist=/Users/builder/export_options.plist
          mkdir -p build/ios/ipa
          IPA_PATH="$(find build -name "*.ipa" -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA was produced. Build outputs:"
            find build/ios -maxdepth 5 -type f -print
            echo "Archived framework architectures:"
            find build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app -name "*.framework" -type d -print | while read -r framework; do
              binary="$framework/$(basename "$framework" .framework)"
              echo "$binary"
              lipo -info "$binary" || true
            done
            exit 1
          fi
          if [ "$IPA_PATH" != "build/ios/ipa/downsview_sda.ipa" ]; then
            cp "$IPA_PATH" build/ios/ipa/downsview_sda.ipa
          fi
          ls -la build/ios/ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
