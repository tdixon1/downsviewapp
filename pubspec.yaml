name: downsview_sda
description: Flutter port of the Downsview SDA church app.
publish_to: "none"
version: 1.0.4+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  add_2_calendar: ^3.0.1
  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  go_router: ^17.2.3
  html: ^0.15.5
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  path: ^1.9.0
  share_plus: ^12.0.2
  supabase_flutter: ^2.8.2
  url_launcher: ^6.3.1
  app_settings: ^7.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - .env
    - assets/
